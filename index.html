<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Othello</title>

<link rel="icon"
href="https://i.postimg.cc/jjzp8XPD/Chat-GPT-Image-Feb-24-2026-08-37-43-PM.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="app">

<!-- MENU -->
<div id="menu" class="screen active">

<h1>Othello</h1>

<button id="themeBtn">🌙 Dark</button>

<div class="controls">

<button id="startBtn">Start Game</button>
<button id="howBtn">How To Play</button>

</div>

<!-- Modal -->
<div id="modal">

<div class="box">

<h3>How To Play</h3>

<p>Black starts first</p>
<p>Trap opponent discs</p>
<p>More discs wins</p>

<button id="closeBtn">Close</button>

</div>

</div>

<!-- Footer -->
<div class="footer">

<div class="links">

<a href="https://facebook.com/gurleenrajput.in"><i class="fab fa-facebook"></i></a>
<a href="https://instagram.com/gurleen_rajput_official"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/gurleenrajput"><i class="fab fa-x-twitter"></i></a>
<a href="https://github.com/gurleenrajput"><i class="fab fa-github"></i></a>
<a href="https://buymeacoffee.com/gurleenrajput"><i class="fas fa-mug-hot"></i></a>

</div>

<p>© 2026 Gurleenrajput</p>

</div>

</div>


<!-- GAME -->
<div id="game" class="screen">

<h2>Game</h2>

<div id="board"></div>

<p>Turn: <span id="turn"></span></p>

<button id="backBtn">Menu</button>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
